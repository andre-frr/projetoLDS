services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: projetoLDS
    ports:
      - "5432:5432"

  app:
    build: ./app
    environment:
      - DATABASE_URL=postgresql://admin123@db:5432/projetoLDS
    depends_on:
      - db
    ports:
      - "3000:3000"
